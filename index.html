// ─── Helpers ──────────────────────────────────────────────────────
function ShoeIllustration({ hex, opacity = 0.6 }) {
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity }}>
      <div style={{ position: 'relative', width: '60%', height: '40%' }}>
        <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: `linear-gradient(135deg, ${hex}88, ${hex}44)`, transform: 'rotate(-8deg) scaleX(1.6)' }} />
        <div style={{ position: 'absolute', top: '-20%', left: '10%', width: '50%', height: '70%', borderRadius: '40% 60% 30% 70%', background: `linear-gradient(180deg, ${hex}66, ${hex}33)`, transform: 'rotate(-15deg)' }} />
      </div>
    </div>
  );
}

function OutlineBtn({ children, light = true, style: extra }) {
  const [hovered, setHovered] = useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    padding: '8px 22px', fontSize: 11, fontWeight: 500, textTransform: 'uppercase',
    letterSpacing: '0.06em', borderRadius: 9999, textDecoration: 'none', cursor: 'pointer',
    border: `1px solid ${light ? '#fff' : charcoal}`,
    color: hovered ? (light ? charcoal : '#fff') : (light ? '#fff' : charcoal),
    backgroundColor: hovered ? (light ? '#fff' : charcoal) : 'transparent',
    transition: 'background 0.2s, color 0.2s',
    ...extra,
  };
  return (
    <a href="#" style={base} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
      {children}
    </a>
  );
}

// ─── SVG Icons ────────────────────────────────────────────────────
const iconStyle = { width: 20, height: 20 };

function SearchIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" style={iconStyle}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
}
function CartIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" style={iconStyle}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
}
function HeartIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" style={iconStyle}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
}
function MenuIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" style={iconStyle}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
}
function CloseIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" style={iconStyle}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
}
function ChevronLeft() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" style={iconStyle}><polyline points="15 18 9 12 15 6"/></svg>;
}
function ChevronRight() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" style={iconStyle}><polyline points="9 18 15 12 9 6"/></svg>;
}
function PauseIcon() {
  return <svg viewBox="0 0 24 24" fill="currentColor" style={{ width: 14, height: 14 }}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
}
function PlayIcon() {
  return <svg viewBox="0 0 24 24" fill="currentColor" style={{ width: 14, height: 14 }}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
}

// ─── Announcement Bar ─────────────────────────────────────────────
function AnnouncementBar() {
  return (
    <div style={{ backgroundColor: charcoal, color: '#fff', height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: '0.05em', margin: 0 }}>
        Free Shipping on Orders over 99 zł &nbsp;·&nbsp; Easy Returns
      </p>

  );
}

// ─── Header ───────────────────────────────────────────────────────
function Header() {
  const [mobileOpen, setMobileOpen] = useState(false);
  const [activeMenu, setActiveMenu] = useState(null);
  const [mobileExpanded, setMobileExpanded] = useState(null);
  const timerRef = useRef(null);

  const enter = (key) => { clearTimeout(timerRef.current); setActiveMenu(key); };
  const leave = () => { timerRef.current = setTimeout(() => setActiveMenu(null), 150); };
  const panelEnter = () => clearTimeout(timerRef.current);

  const iconBtn = { background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: charcoal, display: 'flex', alignItems: 'center' };

  return (
    <header style={{ backgroundColor: '#fff', position: 'sticky', top: 0, zIndex: 50, borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
      <nav style={{ display: 'flex', height: 56, alignItems: 'center', padding: '0 24px', position: 'relative' }}>
        {/* Mobile toggle */}
        <button className="lg:hidden" onClick={() => setMobileOpen(o => !o)} style={{ ...iconBtn, marginRight: 12 }}>
          {mobileOpen ? <CloseIcon /> : <MenuIcon />}
        </button>

        {/* Logo */}
        <a href="#" style={{ marginRight: 32, textDecoration: 'none' }}>
          <span style={{ fontSize: 20, fontWeight: 600, fontStyle: 'italic', letterSpacing: '-0.03em', color: charcoal }}>FashionHero</span>
        </a>

        {/* Desktop nav */}
        <div className="hidden lg:flex" style={{ alignItems: 'center', gap: 24, flex: 1 }}>
          {['MEN', 'WOMEN', 'SALE', 'NEW'].map(item => (
            <div key={item}
              onMouseEnter={() => megaMenuData[item] ? enter(item) : setActiveMenu(null)}
              onMouseLeave={leave}
            >
              <a href="#" style={{ fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', color: charcoal, textDecoration: 'none' }}>{item}</a>
            </div>
          ))}
        </div>

        {/* Right */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 'auto' }}>
          <a href="#" className="hidden lg:block" style={{ fontSize: 12, color: warmGray, textDecoration: 'none', padding: '0 8px' }}>About</a>
          <button style={iconBtn}><SearchIcon /></button>
          <button style={iconBtn} className="hidden sm:flex"><HeartIcon /></button>
          <button style={iconBtn}><CartIcon /></button>
        </div>
      </nav>

      {/* Mega menu */}
      {activeMenu && megaMenuData[activeMenu] && (
        <div
          className="hidden lg:block"
          style={{ position: 'absolute', left: 0, right: 0, backgroundColor: '#fff', borderTop: '1px solid rgba(0,0,0,0.05)', boxShadow: '0 8px 24px rgba(0,0,0,0.08)', zIndex: 100 }}
          onMouseEnter={panelEnter}
          onMouseLeave={leave}
        >
          <div style={{ maxWidth: 1280, margin: '0 auto', padding: '32px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40 }}>
            {megaMenuData[activeMenu].map(col => (
              <div key={col.heading}>
                <h3 style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: charcoal, margin: '0 0 12px' }}>{col.heading}</h3>
                <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {col.links.map(link => (
                    <li key={link}><a href="#" style={{ fontSize: 13, color: 'rgba(33,33,33,0.65)', textDecoration: 'none' }}>{link}</a></li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Mobile drawer */}
      <div className="lg:hidden" style={{ overflow: 'hidden', maxHeight: mobileOpen ? 500 : 0, transition: 'max-height 0.3s ease', borderTop: '1px solid rgba(0,0,0,0.05)' }}>
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 2 }}>
          {['MEN', 'WOMEN', 'SALE', 'NEW'].map(item => {
            const cols = megaMenuData[item];
            const isOpen = mobileExpanded === item;
            if (!cols) return <a key={item} href="#" style={{ fontSize: 13, padding: '8px 0', color: charcoal, textDecoration: 'none' }}>{item}</a>;
            return (
              <div key={item}>
                <button onClick={() => setMobileExpanded(isOpen ? null : item)}
                  style={{ width: '100%', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: 13, color: charcoal }}>
                  {item} <span style={{ color: warmGray }}>{isOpen ? '−' : '+'}</span>
                </button>
                {isOpen && (
                  <div style={{ paddingLeft: 16, paddingBottom: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {cols.map(col => (
                      <div key={col.heading}>
                        <p style={{ fontSize: 10, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: warmGray, margin: '0 0 6px' }}>{col.heading}</p>
                        {col.links.map(l => <a key={l} href="#" style={{ display: 'block', fontSize: 13, color: 'rgba(33,33,33,0.65)', textDecoration: 'none', padding: '2px 0' }}>{l}</a>)}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
          <a href="#" style={{ fontSize: 13, padding: '8px 0', color: charcoal, textDecoration: 'none' }}>About</a>
        </div>
      </div>
    </header>
  );
}

// ─── Hero Carousel ────────────────────────────────────────────────
function HeroCarousel() {
  const [current, setCurrent] = useState(0);
  const [playing, setPlaying] = useState(true);
  const next = useCallback(() => setCurrent(p => (p + 1) % heroSlides.length), []);

  useEffect(() => {
    if (!playing) return;
    const id = setInterval(next, 5000);
    return () => clearInterval(id);
  }, [playing, next]);

  const slide = heroSlides[current];

  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{ background: slide.gradient, minHeight: '70vh', display: 'flex', alignItems: 'flex-end', padding: '0 clamp(24px, 6vw, 80px) clamp(48px, 8vw, 96px)', transition: 'background 0.7s', position: 'relative' }}>
        {slide.image && <img src={slide.image} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />}
        <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.35)' }} />
        <div style={{ position: 'relative', zIndex: 10, maxWidth: 520 }}>
          <p style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'rgba(255,255,255,0.7)', marginBottom: 12 }}>{slide.subtitle}</p>
          <h1 style={{ fontSize: 'clamp(2rem, 5vw, 3.5rem)', fontWeight: 300, letterSpacing: '0.02em', color: '#fff', marginBottom: 32, lineHeight: 1.15, whiteSpace: 'pre-line' }}>{slide.title}</h1>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {slide.ctas.map(label => <OutlineBtn key={label}>{label}</OutlineBtn>)}
          </div>
        </div>
      </div>

      {/* Dots + play/pause */}
      <div style={{ position: 'absolute', bottom: 16, left: '50%', transform: 'translateX(-50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
        {heroSlides.map((_, i) => (
          <button key={i} onClick={() => setCurrent(i)}
            style={{ width: 8, height: 8, borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0, background: i === current ? '#fff' : 'rgba(255,255,255,0.4)' }}
          />
        ))}
        <button onClick={() => setPlaying(p => !p)}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.7)', padding: 4, marginLeft: 4, display: 'flex' }}>
          {playing ? <PauseIcon /> : <PlayIcon />}
        </button>
      </div>
    </section>
  );
}

// ─── Category Row ─────────────────────────────────────────────────
function CategoryRow() {
  return (
    <section style={{ padding: 'clamp(24px,4vw,40px) clamp(16px,3vw,48px)' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 16 }}>
        {categories.map(cat => (
          <div key={cat.title} style={{ position: 'relative', aspectRatio: '3/4', overflow: 'hidden', background: cat.gradient }}>
            {cat.image && <img src={cat.image} alt={cat.title} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.5s' }} />}
            <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.3)' }} />
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 16px 28px', textAlign: 'center', zIndex: 10 }}>
              <h3 style={{ fontSize: 18, fontWeight: 300, color: '#fff', marginBottom: 14, letterSpacing: '0.03em' }}>{cat.title}</h3>
              <OutlineBtn>{cat.label}</OutlineBtn>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── Product Card ─────────────────────────────────────────────────
function ProductCard({ product }) {
  const bg = `radial-gradient(ellipse at 50% 60%, ${product.hex}33 0%, ${product.hex}11 40%, #ece9e2 70%)`;
  return (
    <div style={{ minWidth: 220, maxWidth: 220, flexShrink: 0 }}>
      <a href="#" style={{ textDecoration: 'none', color: 'inherit' }}>
        <div style={{ position: 'relative', aspectRatio: '1/1', marginBottom: 10, background: bg, overflow: 'hidden' }}>
          {product.badge && (
            <span style={{ position: 'absolute', top: 12, left: 12, fontSize: 10, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', background: 'rgba(255,255,255,0.9)', padding: '4px 8px', zIndex: 10 }}>
              {product.badge}
            </span>
          )}
          {product.image
            ? <img src={product.image} alt={product.name} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
            : <ShoeIllustration hex={product.hex} />
          }
        </div>
        <h3 style={{ fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', margin: '0 0 4px' }}>{product.name}</h3>
        <p style={{ fontSize: 12, color: warmGray, margin: '0 0 4px' }}>{product.color}</p>
      </a>
      <div style={{ display: 'flex', gap: 6, marginBottom: 6 }}>
        {product.colors.map(hex => (
          <button key={hex} style={{ width: 12, height: 12, borderRadius: '50%', backgroundColor: hex, border: '1px solid rgba(0,0,0,0.1)', cursor: 'pointer', padding: 0 }} />
        ))}
      </div>
      <p style={{ fontSize: 14, fontWeight: 500, margin: 0 }}>{product.price} zł</p>
    </div>
  );
}

// ─── Product Carousel ─────────────────────────────────────────────
function ProductCarousel() {
  const [tab, setTab] = useState('new');
  const scrollRef = useRef(null);
  const items = allProducts.filter(p => p.tags.includes(tab === 'new' ? 'new-arrivals' : 'best-sellers'));
  const scroll = dir => scrollRef.current && scrollRef.current.scrollBy({ left: dir === 'left' ? -300 : 300, behavior: 'smooth' });
  const navBtn = { position: 'absolute', top: '35%', transform: 'translateY(-50%)', zIndex: 10, background: 'rgba(255,255,255,0.9)', border: 'none', borderRadius: '50%', width: 36, height: 36, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.12)' };

  return (
    <section style={{ padding: '48px 0' }}>
      <h2 style={{ fontSize: 'clamp(28px, 4vw, 40px)', fontWeight: 300, textAlign: 'center', color: charcoal, margin: '0 0 8px' }}>Our Favorites</h2>
      <div style={{ display: 'flex', justifyContent: 'center', gap: 24, marginBottom: 32 }}>
        {[['new', 'NEW ARRIVALS'], ['best', 'BEST SELLERS']].map(([val, label]) => (
          <button key={val} onClick={() => setTab(val)}
            style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', paddingBottom: 4, borderBottom: `2px solid ${tab === val ? charcoal : 'transparent'}`, color: tab === val ? charcoal : warmGray }}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ position: 'relative', padding: '0 clamp(16px,4vw,48px)' }}>
        <button onClick={() => scroll('left')} className="hidden md:flex" style={{ ...navBtn, left: 8 }}><ChevronLeft /></button>
        <div ref={scrollRef} className="scrollbar-hide" style={{ display: 'flex', gap: 16, overflowX: 'auto', paddingBottom: 4 }}>
          {items.map(p => <ProductCard key={p.id} product={p} />)}
        </div>
        <button onClick={() => scroll('right')} className="hidden md:flex" style={{ ...navBtn, right: 8 }}><ChevronRight /></button>
      </div>
    </section>
  );
}

// ─── Feature Story ────────────────────────────────────────────────
function FeatureStory() {
  return (
    <section style={{ padding: 'clamp(24px,4vw,40px) clamp(16px,3vw,48px)' }}>
      <h2 style={{ fontSize: 'clamp(28px,4vw,40px)', fontWeight: 300, textAlign: 'center', color: charcoal, margin: '0 0 40px', lineHeight: 1.2 }}>Your Easy, Breezy MVP</h2>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 16 }}>
        {spotlights.map(item => (
          <div key={item.name} style={{ position: 'relative', overflow: 'hidden', background: item.gradient, minHeight: 520 }}>
            {item.image
              ? <img src={item.image} alt={item.name} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
              : <div style={{ position: 'absolute', inset: 0 }}><ShoeIllustration hex={item.hex} opacity={0.35} /></div>
            }
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 50%, transparent 100%)' }} />
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: 32, zIndex: 10 }}>
              <p style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(255,255,255,0.7)', marginBottom: 8 }}>{item.label}</p>
              <h3 style={{ fontSize: 24, fontWeight: 300, color: '#fff', marginBottom: 8 }}>{item.name}</h3>
              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.8)', marginBottom: 24, maxWidth: 280, lineHeight: 1.6 }}>{item.tagline}</p>
              <OutlineBtn>EXPLORE MORE</OutlineBtn>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── Promo Tiles ──────────────────────────────────────────────────
function PromoTiles() {
  return (
    <section style={{ padding: 'clamp(24px,4vw,40px) clamp(16px,3vw,48px)' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 16 }}>
        {promos.map(promo => (
          <div key={promo.title} style={{ position: 'relative', overflow: 'hidden', background: promo.gradient, aspectRatio: '3/4' }}>
            {promo.image
              ? <img src={promo.image} alt={promo.title} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
              : <div style={{ position: 'absolute', inset: 0 }}><ShoeIllustration hex={promo.hex} opacity={0.3} /></div>
            }
            <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.35)' }} />
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 24px 28px', textAlign: 'center', zIndex: 10 }}>
              <h3 style={{ fontSize: 20, fontWeight: 300, color: '#fff', marginBottom: 16, letterSpacing: '0.03em' }}>{promo.title}</h3>
              <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
                <OutlineBtn>SHOP MEN</OutlineBtn>
                <OutlineBtn>SHOP WOMEN</OutlineBtn>
              </div>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── Value Props ──────────────────────────────────────────────────
function ValueProps() {
  return (
    <section style={{ padding: 'clamp(40px,6vw,64px) clamp(16px,3vw,48px)', backgroundColor: creamLight }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 40, maxWidth: 900, margin: '0 auto', textAlign: 'center' }}>
        {valueProps.map(p => (
          <div key={p.label}>
            <p style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: warmGray, marginBottom: 8 }}>{p.label}</p>
            <h3 style={{ fontSize: 18, fontWeight: 300, color: charcoal, marginBottom: 12 }}>{p.title}</h3>
            <p style={{ fontSize: 14, color: warmGray, lineHeight: 1.7, margin: 0 }}>{p.desc}</p>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── Footer ───────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{ backgroundColor: '#212121', color: '#fff' }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: 'clamp(40px,5vw,64px) clamp(16px,3vw,32px)' }}>
        {/* Social */}
        <div style={{ marginBottom: 48, paddingBottom: 40, borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
          <h3 style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>FOLLOW THE FLOCK</h3>
          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
            {['Instagram', 'TikTok', 'Facebook', 'X/Twitter'].map(s => (
              <a key={s} href="#" style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)', textDecoration: 'none' }}>{s}</a>
            ))}
          </div>
        </div>

        {/* Links grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 40 }}>
          {/* Email signup */}
          <div>
            <h3 style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>JOIN THE FLOCK</h3>
            <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.6)', marginBottom: 16, lineHeight: 1.6 }}>Get the latest on new products, exclusive deals, and more.</p>
            <form onSubmit={e => e.preventDefault()} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <input type="email" placeholder="Email Address"
                style={{ background: 'transparent', border: 'none', borderBottom: '1px solid rgba(255,255,255,0.3)', padding: '8px 0', fontSize: 14, color: '#fff', outline: 'none' }}
              />
              <button type="submit"
                style={{ alignSelf: 'flex-start', padding: '8px 24px', fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: charcoal, backgroundColor: '#fff', border: 'none', borderRadius: 9999, cursor: 'pointer' }}>
                Sign Up
              </button>
            </form>
          </div>

          {footerSections.map(sec => (
            <div key={sec.title}>
              <h3 style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>{sec.title}</h3>
              <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 10 }}>
                {sec.links.map(link => (
                  <li key={link}><a href="#" style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)', textDecoration: 'none' }}>{link}</a></li>
                ))}
              </ul>
            </div>
          ))}
        </div>

        {/* Bottom bar */}
        <div style={{ marginTop: 56, paddingTop: 32, borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
            <span style={{ fontSize: 18, fontWeight: 600, fontStyle: 'italic', letterSpacing: '-0.03em' }}>FashionHero</span>
            <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', border: '1px solid rgba(255,255,255,0.2)', padding: '4px 12px', borderRadius: 4 }}>US ($)</span>
          </div>
          <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', margin: 0 }}>
            &copy; {new Date().getFullYear()} FashionHero, Inc. All Rights Reserved.
          </p>
        </div>
      </div>
    </footer>
  );
}

// ─── App ──────────────────────────────────────────────────────────
function App() {
  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <AnnouncementBar />
      <Header />
      <main style={{ flex: 1 }}>
        <HeroCarousel />
        <CategoryRow />
        <ProductCarousel />
        <FeatureStory />
        <PromoTiles />
        <ValueProps />
      </main>
      <Footer />

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
