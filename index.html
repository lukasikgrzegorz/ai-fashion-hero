function OutlineBtn({ children, light = true, style: extra }) {
  const [hovered, setHovered] = useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    padding: '8px 22px', fontSize: 11, fontWeight: 500, textTransform: 'uppercase',
    letterSpacing: '0.06em', borderRadius: 9999, textDecoration: 'none', cursor: 'pointer',
    border: `1px solid ${light ? '#fff' : charcoal}`,
    color: hovered ? (light ? charcoal : '#fff') : (light ? '#fff' : charcoal),
    backgroundColor: hovered ? (light ? '#fff' : charcoal) : 'transparent',
    transition: 'background 0.2s, color 0.2s',
    ...extra,
  };
  return (
    <a href="#" style={base} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
      {children}
    </a>
  );
}

// ─── Header ───────────────────────────────────────────────────────
function Header({ activePage = 'home' }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const [activeMenu, setActiveMenu] = useState(null);
  const [mobileExpanded, setMobileExpanded] = useState(null);
  const timerRef = useRef(null);

  const enter = (key) => { clearTimeout(timerRef.current); setActiveMenu(key); };
  const leave = () => { timerRef.current = setTimeout(() => setActiveMenu(null), 150); };
  const panelEnter = () => clearTimeout(timerRef.current);

  const iconBtn = { background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: charcoal, display: 'flex', alignItems: 'center' };

  return (
    <header style={{ backgroundColor: '#fff', position: 'sticky', top: 0, zIndex: 50, borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
      <nav style={{ display: 'flex', height: 56, alignItems: 'center', padding: '0 24px', position: 'relative' }}>
        {/* Mobile toggle */}
        <button className="mobile-only" onClick={() => setMobileOpen(o => !o)} style={{ ...iconBtn, marginRight: 12 }}>
          {mobileOpen ? <CloseIcon /> : <MenuIcon />}
        </button>

        {/* Logo */}
        <a href="index.html" style={{ marginRight: 32, textDecoration: 'none' }}>
          <span style={{ fontSize: 20, fontWeight: 600, fontStyle: 'italic', letterSpacing: '-0.03em', color: charcoal }}>FashionHero</span>
        </a>

        {/* Desktop nav */}
        <div className="desktop-only" style={{ alignItems: 'center', gap: 24, flex: 1 }}>
          {['MĘŻCZYŹNI', 'KOBIETY', 'WYPRZEDAŻ', 'NOWOŚCI'].map(item => (
            <div key={item} style={{ display: 'flex', alignItems: 'center' }}
              onMouseEnter={() => megaMenuData[item] ? enter(item) : setActiveMenu(null)}
              onMouseLeave={leave}
            >
              <a href="#" style={{ fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', color: charcoal, textDecoration: 'none', borderBottom: '2px solid transparent', paddingBottom: 2 }}>{item}</a>
            </div>
          ))}
          <div style={{ display: 'flex', alignItems: 'center' }}>
            <a href="sellers.html" style={{ fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#5c6b4f', textDecoration: 'none', borderBottom: '2px solid transparent', paddingBottom: 2 }}>
              Dla Sprzedawców
            </a>
          </div>
        </div>

        {/* Right */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 'auto' }}>
          <a href="#" className="desktop-inline" style={{ fontSize: 12, color: warmGray, textDecoration: 'none', padding: '0 8px' }}>O nas</a>
          <button style={iconBtn}><SearchIcon /></button>
          <button style={iconBtn} className="sm-flex"><HeartIcon /></button>
          <button style={iconBtn}><CartIcon /></button>
        </div>
      </nav>

      {/* Mega menu */}
      {activeMenu && megaMenuData[activeMenu] && (
        <div
          className="hidden lg:block"
          style={{ position: 'absolute', left: 0, right: 0, backgroundColor: '#fff', borderTop: '1px solid rgba(0,0,0,0.05)', boxShadow: '0 8px 24px rgba(0,0,0,0.08)', zIndex: 100 }}
          onMouseEnter={panelEnter}
          onMouseLeave={leave}
        >
          <div style={{ maxWidth: 1280, margin: '0 auto', padding: '32px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40 }}>
            {megaMenuData[activeMenu].map(col => (
              <div key={col.heading}>
                <h3 style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: charcoal, margin: '0 0 12px' }}>{col.heading}</h3>
                <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {col.links.map(link => (
                    <li key={link}><a href="#" style={{ fontSize: 13, color: 'rgba(33,33,33,0.65)', textDecoration: 'none' }}>{link}</a></li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Mobile drawer */}
      <div className="mobile-only" style={{ overflow: 'hidden', maxHeight: mobileOpen ? 560 : 0, transition: 'max-height 0.3s ease', borderTop: '1px solid rgba(0,0,0,0.05)', flexDirection: 'column' }}>
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 2 }}>
          {['MĘŻCZYŹNI', 'KOBIETY', 'WYPRZEDAŻ', 'NOWOŚCI'].map(item => {
            const cols = megaMenuData[item];
            const isOpen = mobileExpanded === item;
            if (!cols) return <a key={item} href="#" style={{ fontSize: 13, padding: '8px 0', color: charcoal, textDecoration: 'none' }}>{item}</a>;
            return (
              <div key={item}>
                <button onClick={() => setMobileExpanded(isOpen ? null : item)}
                  style={{ width: '100%', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: 13, color: charcoal }}>
                  {item} <span style={{ color: warmGray }}>{isOpen ? '−' : '+'}</span>
                </button>
                {isOpen && (
                  <div style={{ paddingLeft: 16, paddingBottom: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {cols.map(col => (
                      <div key={col.heading}>
                        <p style={{ fontSize: 10, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', color: warmGray, margin: '0 0 6px' }}>{col.heading}</p>
                        {col.links.map(l => <a key={l} href="#" style={{ display: 'block', fontSize: 13, color: 'rgba(33,33,33,0.65)', textDecoration: 'none', padding: '2px 0' }}>{l}</a>)}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
          <a href="#" style={{ fontSize: 13, padding: '8px 0', color: charcoal, textDecoration: 'none' }}>O nas</a>
          <a href="sellers.html" style={{ fontSize: 13, padding: '8px 0', color: '#5c6b4f', fontWeight: 500, textDecoration: 'none' }}>
            Dla Sprzedawców
          </a>
        </div>
      </div>
    </header>
  );
}

// ─── Hero Carousel ────────────────────────────────────────────────
function HeroCarousel() {
  const [current, setCurrent] = useState(0);
  const [playing, setPlaying] = useState(true);
  const next = useCallback(() => setCurrent(p => (p + 1) % heroSlides.length), []);

  useEffect(() => {
    if (!playing) return;
    const id = setInterval(next, 5000);
    return () => clearInterval(id);
  }, [playing, next]);

  const slide = heroSlides[current];

  return (
    <section style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{ background: slide.gradient, minHeight: '70vh', display: 'flex', alignItems: 'flex-end', padding: '0 clamp(24px, 6vw, 80px) clamp(48px, 8vw, 96px)', transition: 'background 0.7s', position: 'relative' }}>
        {slide.image && <img src={slide.image} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />}
        <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.35)' }} />
        <div style={{ position: 'relative', zIndex: 10, maxWidth: 520 }}>
          <p style={{ fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'rgba(255,255,255,0.7)', marginBottom: 12 }}>{slide.subtitle}</p>
          <h1 style={{ fontSize: 'clamp(2rem, 5vw, 3.5rem)', fontWeight: 300, letterSpacing: '0.02em', color: '#fff', marginBottom: 32, lineHeight: 1.15, whiteSpace: 'pre-line' }}>{slide.title}</h1>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {slide.ctas.map(label => <OutlineBtn key={label}>{label}</OutlineBtn>)}
          </div>
        </div>
      </div>

      {/* Dots + play/pause */}
      <div style={{ position: 'absolute', bottom: 16, left: '50%', transform: 'translateX(-50%)', display: 'flex', alignItems: 'center', gap: 10 }}>
        {heroSlides.map((_, i) => (
          <button key={i} onClick={() => setCurrent(i)}
            style={{ width: 8, height: 8, borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0, background: i === current ? '#fff' : 'rgba(255,255,255,0.4)' }}
          />
        ))}
        <button onClick={() => setPlaying(p => !p)}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.7)', padding: 4, marginLeft: 4, display: 'flex' }}>
          {playing ? <PauseIcon /> : <PlayIcon />}
        </button>
      </div>
    </section>
  );
}

// ─── Category Row ─────────────────────────────────────────────────
function CategoryRow() {
  return (
    <section style={{ padding: 'clamp(24px,4vw,40px) clamp(16px,3vw,48px)' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 16 }}>
        {categories.map(cat => (
          <div key={cat.title} style={{ position: 'relative', aspectRatio: '3/4', overflow: 'hidden', background: cat.gradient }}>
            {cat.image && <img src={cat.image} alt={cat.title} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.5s' }} />}
            <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.3)' }} />
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 16px 28px', textAlign: 'center', zIndex: 10 }}>
              <h3 style={{ fontSize: 18, fontWeight: 300, color: '#fff', marginBottom: 14, letterSpacing: '0.03em' }}>{cat.title}</h3>

          </div>

      </div>
    </section>
  );
}

// ─── Product Card ─────────────────────────────────────────────────
function ProductCard({ product }) {
  const bg = `radial-gradient(ellipse at 50% 60%, ${product.hex}33 0%, ${product.hex}11 40%, #ece9e2 70%)`;
  return (
    <div style={{ minWidth: 220, maxWidth: 220, flexShrink: 0 }}>
      <a href="#" style={{ textDecoration: 'none', color: 'inherit' }}>
        <div style={{ position: 'relative', aspectRatio: '1/1', marginBottom: 10, background: bg, overflow: 'hidden' }}>
          {product.badge && (
            <span style={{ position: 'absolute', top: 12, left: 12, fontSize: 10, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em', background: 'rgba(255,255,255,0.9)', padding: '4px 8px', zIndex: 10 }}>
              {product.badge}
            </span>
          )}
          {product.image
            ? <img src={product.image} alt={product.name} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
            : <ShoeIllustration hex={product.hex} />
          }
        </div>
        <h3 style={{ fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', margin: '0 0 4px' }}>{product.name}</h3>
        <p style={{ fontSize: 12, color: warmGray, margin: '0 0 4px' }}>{product.color}</p>
      </a>
      <div style={{ display: 'flex', gap: 6, marginBottom: 6 }}>
        {product.colors.map(hex => (
          <button key={hex} style={{ width: 12, height: 12, borderRadius: '50%', backgroundColor: hex, border: '1px solid rgba(0,0,0,0.1)', cursor: 'pointer', padding: 0 }} />
        ))}
      </div>
      <p style={{ fontSize: 14, fontWeight: 500, margin: 0 }}>{product.price} zł</p>
    </div>
  );
}

// ─── Product Carousel ─────────────────────────────────────────────
function ProductCarousel() {
  const [tab, setTab] = useState('new');
  const scrollRef = useRef(null);
  const items = allProducts.filter(p => p.tags.includes(tab === 'new' ? 'new-arrivals' : 'best-sellers'));
  const scroll = dir => scrollRef.current && scrollRef.current.scrollBy({ left: dir === 'left' ? -300 : 300, behavior: 'smooth' });
  const navBtn = { position: 'absolute', top: '35%', transform: 'translateY(-50%)', zIndex: 10, background: 'rgba(255,255,255,0.9)', border: 'none', borderRadius: '50%', width: 36, height: 36, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.12)' };

  return (
    <section style={{ padding: '48px 0' }}>
      <h2 style={{ fontSize: 'clamp(28px, 4vw, 40px)', fontWeight: 300, textAlign: 'center', color: charcoal, margin: '0 0 8px' }}>Nasze ulubione</h2>
      <div style={{ display: 'flex', justifyContent: 'center', gap: 24, marginBottom: 32 }}>
        {[['new', 'NOWOŚCI'], ['best', 'BESTSELLERY']].map(([val, label]) => (
          <button key={val} onClick={() => setTab(val)}
            style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', paddingBottom: 4, borderBottom: `2px solid ${tab === val ? charcoal : 'transparent'}`, color: tab === val ? charcoal : warmGray }}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ position: 'relative', padding: '0 clamp(16px,4vw,48px)' }}>
        <button onClick={() => scroll('left')} className="hidden md:flex" style={{ ...navBtn, left: 8 }}><ChevronLeft /></button>
        <div ref={scrollRef} className="scrollbar-hide" style={{ display: 'flex', gap: 16, overflowX: 'auto', paddingBottom: 4 }}>
          {items.map(p => <ProductCard key={p.id} product={p} />)}
        </div>
        <button onClick={() => scroll('right')} className="hidden md:flex" style={{ ...navBtn, right: 8 }}><ChevronRight /></button>
      </div>
    </section>
  );
}

  return (

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 16 }}>

          <div key={item.name} style={{ position: 'relative', overflow: 'hidden', background: item.gradient, minHeight: 520 }}>
            {item.image
              ? <img src={item.image} alt={item.name} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
              : <div style={{ position: 'absolute', inset: 0 }}><ShoeIllustration hex={item.hex} opacity={0.35} /></div>

            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 50%, transparent 100%)' }} />

              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.8)', marginBottom: 24, maxWidth: 280, lineHeight: 1.6 }}>{item.tagline}</p>

        {valueProps.map(p => (
          <div key={p.label}>

          <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>

// ─── Promoted Listings Section ────────────────────────────────────
const gold = '#c9a84c';
const goldLight = '#f0d080';
const goldDark = '#9a7a2a';

function StarRating({ value }) {
  return (
    <span style={{ color: gold, fontSize: 13, letterSpacing: 2 }}>
      {'★'.repeat(Math.round(value))}{'☆'.repeat(5 - Math.round(value))}
    </span>
  );
}

function PromotedListingsSection() {
  return (
    <section style={{ background: 'linear-gradient(180deg, #1a1710 0%, #2a2518 50%, #1a1710 100%)', padding: 'clamp(40px,5vw,72px) 0', position: 'relative', overflow: 'hidden' }}>
      {/* subtle golden shimmer background */}
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%)', pointerEvents: 'none' }} />

      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 clamp(16px,3vw,48px)', position: 'relative' }}>
        {/* Header */}
        <div style={{ textAlign: 'center', marginBottom: 48 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
            <div style={{ height: 1, width: 40, background: `linear-gradient(to right, transparent, ${gold})` }} />
            <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.14em', color: gold }}>
              ✦ Promowani Sprzedawcy ✦
            </span>
            <div style={{ height: 1, width: 40, background: `linear-gradient(to left, transparent, ${gold})` }} />
          </div>
          <h2 style={{ fontSize: 'clamp(26px,4vw,44px)', fontWeight: 300, color: '#f5ecd4', margin: '0 0 12px', letterSpacing: '0.04em' }}>
            Wyróżnieni na FashionHero
          </h2>
          <p style={{ fontSize: 14, color: 'rgba(245,236,212,0.55)', margin: 0 }}>
            Sprawdzeni sprzedawcy z najwyższymi ocenami klientów
          </p>
        </div>

        {/* Cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 24 }}>
          {promotedProducts.map(p => (
            <a key={p.id} href="#" style={{ textDecoration: 'none', display: 'flex', flexDirection: 'column', background: 'linear-gradient(160deg, #2e2a1c 0%, #231f13 100%)', border: `1px solid rgba(201,168,76,0.25)`, overflow: 'hidden', position: 'relative', transition: 'border-color 0.2s, transform 0.2s', cursor: 'pointer' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(201,168,76,0.7)'; e.currentTarget.style.transform = 'translateY(-3px)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(201,168,76,0.25)'; e.currentTarget.style.transform = 'translateY(0)'; }}
            >
              {/* Gold corner accent */}
              <div style={{ position: 'absolute', top: 0, left: 0, width: 0, height: 0, borderStyle: 'solid', borderWidth: '36px 36px 0 0', borderColor: `${gold} transparent transparent transparent`, zIndex: 20 }} />
              <span style={{ position: 'absolute', top: 5, left: 3, fontSize: 9, color: '#1a1710', fontWeight: 700, zIndex: 21, letterSpacing: '0.04em', lineHeight: 1 }}>PRO</span>

              {/* Image */}
              <div style={{ position: 'relative', aspectRatio: '4/3', overflow: 'hidden' }}>
                <img src={p.image} alt={p.name} style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.4s' }}
                  onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.05)'}
                  onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
                />
                <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(26,23,16,0.6) 0%, transparent 60%)' }} />
                <div style={{ position: 'absolute', bottom: 12, left: 14, right: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                  <span style={{ fontSize: 16, fontWeight: 600, color: '#f5ecd4', letterSpacing: '0.02em' }}>{p.name}</span>
                  <span style={{ fontSize: 17, fontWeight: 600, color: goldLight }}>{p.price} zł</span>
                </div>
              </div>

              {/* Info */}
              <div style={{ padding: '16px 16px 20px' }}>
                <p style={{ fontSize: 10, color: gold, margin: '0 0 6px', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>{p.seller}</p>
                <p style={{ fontSize: 12, color: 'rgba(245,236,212,0.5)', margin: '0 0 10px' }}>{p.color}</p>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <StarRating value={p.rating} />
                    <span style={{ fontSize: 12, color: 'rgba(245,236,212,0.5)' }}>{p.rating} ({p.reviews})</span>
                  </div>
                  <span style={{ fontSize: 10, color: gold, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>KUP →</span>
                </div>
              </div>

              {/* Bottom gold line */}
              <div style={{ height: 2, background: `linear-gradient(to right, transparent, ${gold}, transparent)` }} />
            </a>
          ))}
        </div>

        {/* Footer link */}
        <div style={{ textAlign: 'center', marginTop: 40 }}>
          <a href="#" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.1em', color: gold, textDecoration: 'none', padding: '10px 28px', border: `1px solid rgba(201,168,76,0.4)`, background: 'rgba(201,168,76,0.07)' }}>
            Pokaż więcej →
          </a>
        </div>
      </div>
    </section>
  );
}
