];

function dirColor(dir) {
  if (dir === 'up') return 'text-green-500';
  if (dir === 'down') return 'text-red-400';
  return 'text-gray-400';
}
function dirArrow(dir) {
  if (dir === 'up') return '↗';
  if (dir === 'down') return '↘';
  return '→';
}

function AddSourceModal({ active, onClose, onAdd, onRemove }) {
  const all = [...DEFAULT_PLATFORMS, ...AVAILABLE_PLATFORMS];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.45)' }} onClick={onClose}>

        </div>
        <p className="text-xs text-warm-gray mb-4">Zaznacz platformy, które chcesz śledzić w panelu trendów.</p>
        <div className="space-y-2">
          {all.map(p => {
            const isActive = active.some(a => a.id === p.id);
            return (
              <div key={p.id} className="flex items-center justify-between px-4 py-3 rounded-xl border border-gray-100 hover:border-gray-200 transition-colors">
                <span className="text-sm font-medium text-charcoal">{p.name}</span>
                <button
                  onClick={() => isActive ? onRemove(p.id) : onAdd(p)}
                  className={`text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full transition-colors ${isActive ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-gold/10 text-gold hover:bg-gold/20'}`}

          Gotowe
        </button>
      </div>
    </div>
  );
}

function SocialTrends() {
  const [platforms, setPlatforms] = useState(DEFAULT_PLATFORMS);
  const [showModal, setShowModal] = useState(false);

  const addPlatform = (p) => setPlatforms(prev => [...prev, p]);
  const removePlatform = (id) => setPlatforms(prev => prev.filter(p => p.id !== id));

  return (
    <>
      {showModal && <AddSourceModal active={platforms} onClose={() => setShowModal(false)} onAdd={addPlatform} onRemove={removePlatform} />}
      <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-4">
        <div className="flex justify-between items-center mb-2">
          <h3 className="text-sm font-bold uppercase tracking-wider text-charcoal">Trendy Social Media (Odzież)</h3>
          <button
            onClick={() => setShowModal(true)}
            className="text-[10px] font-bold uppercase tracking-widest text-gold bg-gold/10 px-3 py-1.5 rounded-full hover:bg-gold/20 transition-colors"
          >
            ⚙ Konfiguruj
          </button>
        </div>

        {platforms.length === 0 && (
          <div className="text-center py-8 text-warm-gray text-sm">Brak źródeł. Kliknij "Konfiguruj", aby dodać platformy.</div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {platforms.map(platform => (
            <div key={platform.id} className="border border-gray-100 rounded-xl p-4 hover:border-gray-200 transition-colors">
              <div className="flex justify-between items-center mb-3">
                <span className="font-semibold text-charcoal flex items-center gap-2">
                  {platform.icon || <span className="w-4 h-4 inline-block bg-gray-200 rounded-full" />}
                  {platform.name}
                </span>
                <span className="text-[10px] text-warm-gray uppercase tracking-widest">Ostatnie 7 dni</span>
              </div>
              <ul className="space-y-3">
                {platform.trends.map(t => (
                  <li key={t.label} className="flex justify-between items-center text-sm">
                    <span className="text-charcoal bg-gray-50 px-2 py-1 rounded">{t.label}</span>
                    <span className={`font-bold ${dirColor(t.dir)}`}>{dirArrow(t.dir)} {t.change}%</span>
                  </li>
                ))}
              </ul>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function DynamicPredictionChart() {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [period, setPeriod] = useState('30'); // 30, 60, 90
  const [category, setCategory] = useState('sneakers'); // sneakers, boots, apparel

  // Generate mock data based on period and category
  const chartData = useMemo(() => {
    const days = parseInt(period);
    const labels = Array.from({length: days/5}, (_, i) => `Dzień ${i*5}`);
    
    let baseTrend, volatility;
    if (category === 'sneakers') { baseTrend = 100; volatility = 20; }
    else if (category === 'boots') { baseTrend = 80; volatility = 30; }
    else { baseTrend = 60; volatility = 15; }

    const data = [];
    let current = baseTrend;
    for(let i=0; i<days/5; i++) {
      // simulate growth for 30, more volatility for 60/90
      current += (Math.random() * volatility) - (volatility * 0.3); 
      data.push(Math.round(current));
    }

    return { labels, data };
  }, [period, category]);

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: 'Prognozowany Popyt',
          data: chartData.data,
          borderColor: '#c9a84c',
          borderWidth: 3,
          pointBackgroundColor: '#c9a84c',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: true,
          backgroundColor: 'rgba(201,168,76, 0.1)',
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { 
          legend: { display: false },
          tooltip: {
            mode: 'index',
            intersect: false,
            backgroundColor: '#212121',
            titleFont: { family: 'Inter', size: 12 },
            bodyFont: { family: 'Inter', size: 13, weight: 'bold' },
            padding: 12,
            displayColors: false,
            callbacks: {
              label: (context) => `Index popytu: ${context.parsed.y}`
            }
          }
        },
        scales: {
          x: { 
            grid: { display: false },
            ticks: { font: { family: 'Inter', size: 11 }, color: '#6b6b6b' }
          },
          y: { 
            grid: { color: '#f0f0f0', drawBorder: false },
            ticks: { font: { family: 'Inter', size: 11 }, color: '#6b6b6b' },
            beginAtZero: false
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false }
      }
    });
  }, [chartData]);

  return (
    <div className="bg-white p-6 md:p-8 rounded-2xl border border-gray-100 shadow-sm col-span-1 lg:col-span-2 flex flex-col mt-6">
      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-100 pb-6">
        <div>
          <h3 className="text-base font-bold uppercase tracking-wider text-charcoal">Predykcja Popytu AI</h3>
          <p className="text-xs text-warm-gray mt-1">Dynamiczne prognozy na podstawie danych historycznych i analizy sentymentu social media</p>
        </div>
        
        <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <select 
            value={category} 
            onChange={e => setCategory(e.target.value)}
            className="text-xs border border-gray-200 rounded-lg px-4 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gold/50 focus:border-gold cursor-pointer text-charcoal font-medium shadow-sm transition-all"

            <option value="apparel">Kategoria: Odzież Sportowa</option>
          </select>
          
          <div className="flex bg-gray-100 rounded-lg p-1 shadow-inner">
            {['30', '60', '90'].map(p => (
              <button 
                key={p} 
                onClick={() => setPeriod(p)}
                className={`text-[11px] font-bold px-4 py-1.5 rounded-md transition-all flex-1 sm:flex-none ${period === p ? 'bg-white shadow-sm text-charcoal' : 'text-warm-gray hover:text-charcoal'}`}
              >
                {p} Dni
              </button>
            ))}
          </div>
        </div>
      </div>
      
      <div className="flex-1 min-h-[350px] relative w-full">
        <canvas ref={canvasRef}></canvas>
      </div>
    </div>
  );
}
